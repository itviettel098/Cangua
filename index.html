<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quét Barcode & QR</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #0a0a0a;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 16px;
    }
    h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
    .sub { font-size: 12px; color: #666; margin-bottom: 16px; }

    #cam-wrap {
      width: 100%;
      max-width: 440px;
      aspect-ratio: 1;
      position: relative;
      background: #111;
      border-radius: 14px;
      overflow: hidden;
      border: 1.5px solid #222;
    }
    #cam {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    #canvas { display: none; }

    .frame {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 60%; height: 60%;
      pointer-events: none;
    }
    .frame::before, .frame::after,
    .frame .b::before, .frame .b::after {
      content: '';
      position: absolute;
      width: 28px; height: 28px;
      border-color: #00e676;
      border-style: solid;
    }
    .frame::before  { top: 0; left: 0;  border-width: 3px 0 0 3px; border-radius: 5px 0 0 0; }
    .frame::after   { top: 0; right: 0; border-width: 3px 3px 0 0; border-radius: 0 5px 0 0; }
    .frame .b::before { bottom: 0; left: 0;  border-width: 0 0 3px 3px; border-radius: 0 0 0 5px; }
    .frame .b::after  { bottom: 0; right: 0; border-width: 0 3px 3px 0; border-radius: 0 0 5px 0; }

    .scanline {
      position: absolute;
      left: 20%; width: 60%;
      height: 2px;
      background: linear-gradient(to right, transparent, #00e676, transparent);
      animation: scan 1.8s ease-in-out infinite;
      top: 20%;
    }
    @keyframes scan {
      0%   { top: 20%; }
      50%  { top: 78%; }
      100% { top: 20%; }
    }

    #info {
      position: absolute;
      bottom: 8px; left: 0; right: 0;
      text-align: center;
      font-size: 11px;
      color: #00e676;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .btns {
      display: flex; gap: 10px;
      margin-top: 14px;
      width: 100%; max-width: 440px;
    }
    button {
      flex: 1; padding: 11px;
      border-radius: 10px; border: none;
      font-size: 14px; font-weight: 500;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.15s;
    }
    button:active { transform: scale(0.96); }
    #btn-start { background: #00e676; color: #000; }
    #btn-stop  { background: #222; color: #eee; display: none; }
    #btn-flip  { background: #1a1a1a; color: #eee; border: 1px solid #333; flex: none; width: 48px; display: none; }

    #msg {
      margin-top: 10px;
      font-size: 12px; color: #555;
      text-align: center; min-height: 18px;
    }

    #result-box {
      margin-top: 14px;
      width: 100%; max-width: 440px;
      background: #141414;
      border: 1px solid #222;
      border-radius: 12px;
      padding: 14px;
      display: none;
    }
    .rlabel { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: #00e676; margin-bottom: 5px; }
    .rvalue { font-size: 16px; font-weight: 500; word-break: break-all; margin-bottom: 6px; }
    .rfmt   { font-size: 11px; color: #555; }
    .rbtn   { margin-top: 10px; width: 100%; background: #1e1e1e; color: #00e676; border: 1px solid #2a2a2a; padding: 8px; border-radius: 8px; font-size: 13px; }

    #hist { margin-top: 16px; width: 100%; max-width: 440px; }
    .hdr  { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .htitle { font-size: 12px; color: #555; }
    #hclear { font-size: 12px; color: #444; background: none; border: none; cursor: pointer; flex: none; }
    .hitem {
      background: #141414; border: 1px solid #1e1e1e;
      border-radius: 10px; padding: 9px 12px;
      margin-bottom: 6px; font-size: 13px;
      display: flex; justify-content: space-between; gap: 8px;
      cursor: pointer;
    }
    .hitem:active { opacity: 0.7; }
    .htxt { word-break: break-all; color: #ccc; }
    .htime { font-size: 11px; color: #444; white-space: nowrap; flex-shrink: 0; padding-top: 2px; }
    .hfmt { font-size: 10px; color: #00e676; margin-bottom: 3px; }
  </style>
</head>
<body>

<h1>📷 Quét Barcode / QR Code</h1>
<p class="sub">Siêu nét — dùng camera độ phân giải tối đa</p>

<div id="cam-wrap">
  <video id="cam" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>
  <div class="frame"><div class="b"></div></div>
  <div class="scanline"></div>
  <div id="info"></div>
</div>

<p id="msg">Nhấn Bắt đầu để mở camera</p>

<div class="btns">
  <button id="btn-start" onclick="startScan()">▶ Bắt đầu</button>
  <button id="btn-stop"  onclick="stopScan()">⏹ Dừng</button>
  <button id="btn-flip"  onclick="flipCam()" title="Đổi camera">🔄</button>
</div>

<div id="result-box">
  <div class="rlabel">Kết quả</div>
  <div class="rvalue" id="rval"></div>
  <div class="rfmt"   id="rfmt"></div>
  <button class="rbtn" onclick="copyResult()">⎘ Sao chép</button>
</div>

<div id="hist">
  <div class="hdr">
    <span class="htitle">Lịch sử</span>
    <button id="hclear" onclick="clearHist()">Xóa tất cả</button>
  </div>
  <div id="hlist"></div>
</div>

<script>
  const video   = document.getElementById('cam');
  const canvas  = document.getElementById('canvas');
  const ctx     = canvas.getContext('2d', { willReadFrequently: true });
  const msgEl   = document.getElementById('msg');
  const infoEl  = document.getElementById('info');

  let stream = null;
  let detector = null;
  let scanning = false;
  let facingMode = 'environment';
  let lastText = '';
  let rafId = null;
  let history = JSON.parse(localStorage.getItem('bh') || '[]');

  renderHist();

  // BarcodeDetector (Chrome Android / Edge / Safari 17+)
  const FORMATS = [
    'qr_code','aztec','code_128','code_39','code_93',
    'codabar','data_matrix','ean_13','ean_8','itf',
    'pdf417','upc_a','upc_e'
  ];

  async function initDetector() {
    if ('BarcodeDetector' in window) {
      try {
        detector = new BarcodeDetector({ formats: FORMATS });
        return true;
      } catch(e) {}
    }
    return false;
  }

  async function getBestStream() {
    // Thử từ cao xuống thấp để lấy độ nét max
    const configs = [
      { facingMode, width: { ideal: 3840 }, height: { ideal: 2160 }, focusMode: 'continuous', advanced:[{focusMode:'continuous', exposureMode:'continuous', whiteBalanceMode:'continuous'}] },
      { facingMode, width: { ideal: 1920 }, height: { ideal: 1080 }, focusMode: 'continuous' },
      { facingMode, width: { ideal: 1280 }, height: { ideal: 720  } },
      { facingMode },
    ];
    for (const c of configs) {
      try {
        const s = await navigator.mediaDevices.getUserMedia({ video: c });
        return s;
      } catch(e) {}
    }
    throw new Error('Không mở được camera');
  }

  async function applyFocusMax(s) {
    for (const track of s.getVideoTracks()) {
      try {
        const caps = track.getCapabilities();
        const adv = {};
        if (caps.focusMode?.includes('continuous'))       adv.focusMode = 'continuous';
        if (caps.exposureMode?.includes('continuous'))    adv.exposureMode = 'continuous';
        if (caps.whiteBalanceMode?.includes('continuous')) adv.whiteBalanceMode = 'continuous';
        // Zoom min = nét nhất (không zoom = ít mờ nhất)
        if (caps.zoom) adv.zoom = caps.zoom.min;
        // Sharpness max
        if (caps.sharpness) adv.sharpness = caps.sharpness.max;
        // Contrast max nhẹ
        if (caps.contrast) adv.contrast = Math.min(caps.contrast.max, caps.contrast.max * 0.8);
        if (Object.keys(adv).length) await track.applyConstraints({ advanced: [adv] });
      } catch(e) { console.warn('applyConstraints:', e); }
    }
  }

  async function startScan() {
    if (scanning) return;
    msgEl.textContent = 'Đang khởi động camera...';

    const hasDetector = await initDetector();
    if (!hasDetector) {
      msgEl.textContent = '❌ Trình duyệt không hỗ trợ BarcodeDetector. Dùng Chrome Android hoặc Edge.';
      return;
    }

    try {
      stream = await getBestStream();
      video.srcObject = stream;
      await video.play();

      // Đợi video ổn định rồi áp focus max
      setTimeout(() => applyFocusMax(stream), 800);

      scanning = true;
      document.getElementById('btn-start').style.display = 'none';
      document.getElementById('btn-stop').style.display  = 'flex';
      document.getElementById('btn-flip').style.display  = 'flex';

      const t = stream.getVideoTracks()[0]?.getSettings();
      msgEl.textContent = t ? `📷 ${t.width}×${t.height} @ ${Math.round(t.frameRate||0)}fps` : 'Đang quét...';

      lastText = '';
      loop();
    } catch(e) {
      msgEl.textContent = '❌ ' + e.message;
    }
  }

  async function loop() {
    if (!scanning) return;
    if (video.readyState >= 2) {
      try {
        const barcodes = await detector.detect(video);
        if (barcodes.length > 0) {
          const b = barcodes[0];
          if (b.rawValue !== lastText) {
            lastText = b.rawValue;
            onDetected(b.rawValue, b.format);
          }
        }
      } catch(e) {}
    }
    rafId = requestAnimationFrame(loop);
  }

  function onDetected(text, format) {
    document.getElementById('result-box').style.display = 'block';
    document.getElementById('rval').textContent = text;
    document.getElementById('rfmt').textContent = '📌 ' + (format || 'unknown');

    infoEl.textContent = '✓ Quét được!';
    infoEl.style.opacity = '1';
    setTimeout(() => infoEl.style.opacity = '0', 1500);

    if (navigator.vibrate) navigator.vibrate(80);

    const entry = { text, format: format || '?', time: new Date().toLocaleTimeString('vi-VN') };
    history.unshift(entry);
    if (history.length > 50) history = history.slice(0, 50);
    localStorage.setItem('bh', JSON.stringify(history));
    renderHist();
  }

  function stopScan() {
    scanning = false;
    if (rafId) cancelAnimationFrame(rafId);
    if (stream) stream.getTracks().forEach(t => t.stop());
    stream = null;
    video.srcObject = null;
    document.getElementById('btn-start').style.display = 'flex';
    document.getElementById('btn-stop').style.display  = 'none';
    document.getElementById('btn-flip').style.display  = 'none';
    msgEl.textContent = 'Đã dừng.';
    lastText = '';
  }

  async function flipCam() {
    facingMode = facingMode === 'environment' ? 'user' : 'environment';
    stopScan();
    await new Promise(r => setTimeout(r, 300));
    startScan();
  }

  function copyResult() {
    const t = document.getElementById('rval').textContent;
    navigator.clipboard.writeText(t).then(() => {
      const b = document.querySelector('.rbtn');
      b.textContent = '✓ Đã sao chép!';
      setTimeout(() => b.textContent = '⎘ Sao chép', 1500);
    });
  }

  function renderHist() {
    const el = document.getElementById('hlist');
    if (!history.length) {
      el.innerHTML = '<p style="font-size:12px;color:#444;text-align:center;padding:10px 0">Chưa có lịch sử</p>';
      return;
    }
    el.innerHTML = history.map(h => `
      <div class="hitem" onclick="navigator.clipboard.writeText('${h.text.replace(/'/g,"\\'")}')">
        <div>
          <div class="hfmt">${h.format}</div>
          <div class="htxt">${h.text}</div>
        </div>
        <div class="htime">${h.time}</div>
      </div>
    `).join('');
  }

  function clearHist() {
    history = [];
    localStorage.removeItem('bh');
    renderHist();
  }
</script>
</body>
</html>
