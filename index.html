<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quét Barcode & QR</title>
  <script src="https://unpkg.com/@zxing/library@0.19.1/umd/index.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #0a0a0a; color: #f0f0f0;
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      padding: 16px;
    }
    h1 { font-size: 19px; font-weight: 600; margin-bottom: 3px; }
    .sub { font-size: 12px; color: #555; margin-bottom: 14px; }

    #wrap {
      width: 100%; max-width: 460px;
      position: relative;
      background: #000;
      border-radius: 14px; overflow: hidden;
      border: 1.5px solid #222;
    }

    /* Video hiển thị trực tiếp - mượt tuyệt đối */
    #vid {
      width: 100%; display: block;
      object-fit: cover;
      /* CSS filter để camera trông nét hơn - không tốn CPU */
      filter: contrast(1.15) saturate(1.1);
    }

    /* Canvas ẩn chỉ dùng để decode */
    #offscreen { display: none; }

    .frame-box {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 82%; height: 55%;
      pointer-events: none;
    }
    .corner {
      position: absolute;
      width: 24px; height: 24px;
      border-color: #00e676; border-style: solid;
    }
    .tl { top:0; left:0;   border-width: 3px 0 0 3px; border-radius: 5px 0 0 0; }
    .tr { top:0; right:0;  border-width: 3px 3px 0 0; border-radius: 0 5px 0 0; }
    .bl { bottom:0; left:0; border-width: 0 0 3px 3px; border-radius: 0 0 0 5px; }
    .br { bottom:0; right:0;border-width: 0 3px 3px 0; border-radius: 0 0 5px 0; }
    /* Đường viền mờ xung quanh */
    .frame-box::before {
      content: '';
      position: absolute;
      inset: 0;
      border: 1px solid rgba(0,230,118,0.2);
      border-radius: 4px;
    }

    .scanline {
      position: absolute;
      left: 9%; width: 82%;
      height: 2px;
      background: linear-gradient(90deg, transparent, #00e676cc, transparent);
      animation: sc 1.8s ease-in-out infinite;
    }
    @keyframes sc {
      0%   { top: 22%; opacity: 1; }
      48%  { top: 76%; opacity: 1; }
      50%  { opacity: 0; top: 76%; }
      52%  { opacity: 0; top: 22%; }
      54%  { opacity: 1; }
      100% { top: 76%; opacity: 1; }
    }

    #flash {
      position: absolute; inset: 0;
      background: rgba(0,230,118,0.25);
      opacity: 0; pointer-events: none;
      transition: opacity 0.15s;
    }

    #cam-info {
      position: absolute; top: 8px; left: 10px;
      font-size: 10px; color: rgba(255,255,255,0.35);
    }

    .btns { display: flex; gap: 8px; margin-top: 12px; width: 100%; max-width: 460px; }
    button {
      flex: 1; padding: 11px; border-radius: 10px;
      border: none; font-size: 14px; font-weight: 500;
      cursor: pointer; transition: transform 0.1s;
    }
    button:active { transform: scale(0.96); }
    #bstart { background: #00e676; color: #000; }
    #bstop  { background: #1e1e1e; color: #eee; display: none; }
    #bflip  { background: #1a1a1a; color: #eee; border: 1px solid #2a2a2a; flex: none; width: 48px; display: none; }

    #msg { margin-top: 8px; font-size: 12px; color: #555; text-align: center; min-height: 18px; }

    #rbox {
      margin-top: 12px; width: 100%; max-width: 460px;
      background: #141414; border: 1px solid #1e1e1e;
      border-radius: 12px; padding: 13px; display: none;
    }
    .rl { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: #00e676; margin-bottom: 4px; }
    .rv { font-size: 16px; font-weight: 500; word-break: break-all; margin-bottom: 5px; }
    .rf { font-size: 11px; color: #555; }
    .rb { margin-top: 9px; width: 100%; background: #1e1e1e; color: #00e676; border: 1px solid #252525; padding: 8px; border-radius: 8px; font-size: 13px; }

    #hist { margin-top: 14px; width: 100%; max-width: 460px; }
    .hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 7px; }
    .ht { font-size: 12px; color: #444; }
    #hclr { font-size: 12px; color: #383838; background: none; border: none; cursor: pointer; flex: none; }
    .hi {
      background: #111; border: 1px solid #1a1a1a;
      border-radius: 9px; padding: 8px 11px;
      margin-bottom: 5px; display: flex;
      justify-content: space-between; gap: 8px;
      cursor: pointer;
    }
    .htx { word-break: break-all; color: #bbb; font-size: 13px; }
    .htm { font-size: 10px; color: #00e676; margin-bottom: 2px; }
    .hti { font-size: 11px; color: #383838; white-space: nowrap; flex-shrink: 0; padding-top: 2px; }
  </style>
</head>
<body>

<h1>📷 Quét Barcode / QR</h1>
<p class="sub">Video mượt · ZXing decode · Nhạy cao</p>

<div id="wrap">
  <video id="vid" autoplay playsinline muted></video>
  <canvas id="offscreen"></canvas>
  <div class="frame-box">
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>
  </div>
  <div class="scanline"></div>
  <div id="flash"></div>
  <div id="cam-info"></div>
</div>

<p id="msg">Nhấn Bắt đầu để mở camera</p>

<div class="btns">
  <button id="bstart" onclick="startScan()">▶ Bắt đầu</button>
  <button id="bstop"  onclick="stopScan()">⏹ Dừng</button>
  <button id="bflip"  onclick="flipCam()">🔄</button>
</div>

<div id="rbox">
  <div class="rl">Kết quả</div>
  <div class="rv" id="rv"></div>
  <div class="rf" id="rf"></div>
  <button class="rb" onclick="copyR()">⎘ Sao chép</button>
</div>

<div id="hist">
  <div class="hdr">
    <span class="ht">Lịch sử</span>
    <button id="hclr" onclick="clearH()">Xóa tất cả</button>
  </div>
  <div id="hlist"></div>
</div>

<script>
const vid      = document.getElementById('vid');
const offscreen = document.getElementById('offscreen');
const octx     = offscreen.getContext('2d', { willReadFrequently: true });
const msgEl    = document.getElementById('msg');
const flashEl  = document.getElementById('flash');
const camInfo  = document.getElementById('cam-info');

let stream  = null;
let scanning = false;
let decodeTimer = null;
let facing  = 'environment';
let lastText = '';
let reader  = null;
let history = JSON.parse(localStorage.getItem('bh3') || '[]');

renderH();

// ZXing multi-format với TRY_HARDER
function initReader() {
  const hints = new Map();
  hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [
    ZXing.BarcodeFormat.QR_CODE,
    ZXing.BarcodeFormat.EAN_13, ZXing.BarcodeFormat.EAN_8,
    ZXing.BarcodeFormat.CODE_128, ZXing.BarcodeFormat.CODE_39, ZXing.BarcodeFormat.CODE_93,
    ZXing.BarcodeFormat.UPC_A, ZXing.BarcodeFormat.UPC_E,
    ZXing.BarcodeFormat.ITF, ZXing.BarcodeFormat.PDF_417,
    ZXing.BarcodeFormat.DATA_MATRIX, ZXing.BarcodeFormat.AZTEC,
    ZXing.BarcodeFormat.CODABAR,
  ]);
  hints.set(ZXing.DecodeHintType.TRY_HARDER, true);
  reader = new ZXing.MultiFormatReader();
  reader.setHints(hints);
}

async function getBestStream() {
  // Thử lần lượt từ cao xuống thấp
  for (const cfg of [
    { facingMode: facing, width: { ideal: 1920 }, height: { ideal: 1080 }, focusMode: 'continuous' },
    { facingMode: facing, width: { ideal: 1280 }, height: { ideal: 720  }, focusMode: 'continuous' },
    { facingMode: facing },
  ]) {
    try { return await navigator.mediaDevices.getUserMedia({ video: cfg }); } catch(e) {}
  }
  throw new Error('Không mở được camera');
}

async function applyFocus(s) {
  for (const t of s.getVideoTracks()) {
    try {
      const caps = t.getCapabilities();
      const adv = {};
      if (caps.focusMode?.includes('continuous'))        adv.focusMode = 'continuous';
      if (caps.exposureMode?.includes('continuous'))     adv.exposureMode = 'continuous';
      if (caps.whiteBalanceMode?.includes('continuous')) adv.whiteBalanceMode = 'continuous';
      if (caps.zoom)      adv.zoom = caps.zoom.min;
      if (caps.sharpness) adv.sharpness = caps.sharpness.max;
      if (Object.keys(adv).length) await t.applyConstraints({ advanced: [adv] });
    } catch(e) {}
  }
}

async function startScan() {
  if (scanning) return;
  msgEl.textContent = 'Đang khởi động...';
  initReader();
  try {
    stream = await getBestStream();
    vid.srcObject = stream;
    await vid.play();
    setTimeout(() => applyFocus(stream), 700);

    const s = stream.getVideoTracks()[0]?.getSettings() || {};
    camInfo.textContent = s.width ? `${s.width}×${s.height}` : '';
    msgEl.textContent = 'Đang quét...';

    scanning = true;
    lastText = '';
    document.getElementById('bstart').style.display = 'none';
    document.getElementById('bstop').style.display  = 'flex';
    document.getElementById('bflip').style.display  = 'flex';

    // Decode mỗi 150ms — đủ nhanh, không lag video
    decodeLoop();
  } catch(e) {
    msgEl.textContent = '❌ ' + e.message;
  }
}

// ===== DECODE LOOP: chạy riêng, không block video =====
function decodeLoop() {
  if (!scanning) return;
  decodeFrame();
  decodeTimer = setTimeout(decodeLoop, 150);
}

function decodeFrame() {
  if (!vid.videoWidth || vid.readyState < 2) return;

  const W = vid.videoWidth;
  const H = vid.videoHeight;

  // Thử 1: Crop vùng giữa (vùng khung quét) — decode nhanh hơn
  const cropX = Math.floor(W * 0.09);
  const cropY = Math.floor(H * 0.22);
  const cropW = Math.floor(W * 0.82);
  const cropH = Math.floor(H * 0.55);

  let result = decodeRegion(cropX, cropY, cropW, cropH, W, H);

  // Thử 2: Full frame nếu không ra
  if (!result) {
    result = decodeRegion(0, 0, W, H, W, H);
  }

  if (result) {
    const text = result.getText();
    const fmt  = result.getBarcodeFormat();
    if (text !== lastText) {
      lastText = text;
      onDetected(text, fmt);
    }
  }
}

function decodeRegion(sx, sy, sw, sh, vidW, vidH) {
  // Scale xuống để decode nhanh hơn (max 640px rộng)
  const scale = Math.min(1, 640 / sw);
  const dw = Math.floor(sw * scale);
  const dh = Math.floor(sh * scale);

  offscreen.width  = dw;
  offscreen.height = dh;
  octx.drawImage(vid, sx, sy, sw, sh, 0, 0, dw, dh);

  try {
    const imgData = octx.getImageData(0, 0, dw, dh);
    // Grayscale nhanh
    const lum = new Uint8ClampedArray(dw * dh);
    for (let i = 0; i < dw * dh; i++) {
      lum[i] = (imgData.data[i*4]*77 + imgData.data[i*4+1]*150 + imgData.data[i*4+2]*29) >> 8;
    }
    const src = new ZXing.RGBLuminanceSource(lum, dw, dh);
    const bmp = new ZXing.BinaryBitmap(new ZXing.HybridBinarizer(src));
    return reader.decode(bmp);
  } catch(e) { return null; }
}

function onDetected(text, fmt) {
  document.getElementById('rbox').style.display = 'block';
  document.getElementById('rv').textContent = text;
  document.getElementById('rf').textContent = '📌 ' + (ZXing.BarcodeFormat[fmt] ?? fmt);

  // Flash xanh nhẹ
  flashEl.style.opacity = '1';
  setTimeout(() => flashEl.style.opacity = '0', 250);

  if (navigator.vibrate) navigator.vibrate(80);

  const e = { text, fmt: String(ZXing.BarcodeFormat[fmt] ?? fmt), time: new Date().toLocaleTimeString('vi-VN') };
  history.unshift(e);
  if (history.length > 50) history = history.slice(0, 50);
  localStorage.setItem('bh3', JSON.stringify(history));
  renderH();
}

function stopScan() {
  scanning = false;
  clearTimeout(decodeTimer);
  if (stream) stream.getTracks().forEach(t => t.stop());
  stream = null; vid.srcObject = null;
  document.getElementById('bstart').style.display = 'flex';
  document.getElementById('bstop').style.display  = 'none';
  document.getElementById('bflip').style.display  = 'none';
  msgEl.textContent = 'Đã dừng.';
  camInfo.textContent = '';
  lastText = '';
}

async function flipCam() {
  facing = facing === 'environment' ? 'user' : 'environment';
  stopScan();
  await new Promise(r => setTimeout(r, 300));
  startScan();
}

function copyR() {
  navigator.clipboard.writeText(document.getElementById('rv').textContent).then(() => {
    const b = document.querySelector('.rb');
    b.textContent = '✓ Đã sao chép!';
    setTimeout(() => b.textContent = '⎘ Sao chép', 1500);
  });
}

function renderH() {
  const el = document.getElementById('hlist');
  if (!history.length) {
    el.innerHTML = '<p style="font-size:12px;color:#333;text-align:center;padding:10px 0">Chưa có lịch sử</p>';
    return;
  }
  el.innerHTML = history.map(h => `
    <div class="hi" onclick="navigator.clipboard.writeText('${h.text.replace(/'/g,"\\'")}')">
      <div>
        <div class="htm">${h.fmt}</div>
        <div class="htx">${h.text}</div>
      </div>
      <div class="hti">${h.time}</div>
    </div>`).join('');
}

function clearH() {
  history = [];
  localStorage.removeItem('bh3');
  renderH();
}
</script>
</body>
</html>
